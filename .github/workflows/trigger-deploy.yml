name: Deploy Trigger.dev tasks

# Vercel deploys the Next.js app itself via its own Git integration — this
# workflow only handles Trigger.dev, which Vercel cannot deploy.
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # prisma.config.ts resolves DIRECT_URL at load time; `prisma generate`
      # (postinstall) never connects, so a placeholder satisfies it in CI.
      DIRECT_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Deploy Trigger.dev tasks
        env:
          TRIGGER_ACCESS_TOKEN: ${{ secrets.TRIGGER_ACCESS_TOKEN }}
        # Pinned to the exact CLI version in package.json so CI never hits the
        # "installed packages newer than CLI" mismatch that broke local deploys.
        run: npx trigger.dev@4.5.0 deploy
